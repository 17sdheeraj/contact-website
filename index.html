      /* Prize ticker styles using Hack Club theme */
      .prize-section { 
        padding: var(--spacing-5) var(--spacing-3);

      .prize-section h2 {

      .prize-section p { margin: 0 0 var(--spacing-4) 0; }
      .ticker-wrap { 
        overflow: hidden; 
        position: relative; 
        width: 100%;
        background: var(--elevated);
        border-radius: var(--radii-extra);
        margin-bottom: var(--spacing-3);
      }
      .ticker { 
        display: flex; 
        gap: var(--spacing-3);
        align-items: center; 
        will-change: transform;
        padding: var(--spacing-3);
      }
      .prize-card { 
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--spacing-2);
        min-width: 160px;
        background: var(--elevated);
        padding: var(--spacing-3);
        border-radius: var(--radii-extra);
        box-shadow: var(--shadow-card);
        border: 2px solid var(--sheet);
        transition: all 0.2s ease;
      }
      .prize-card:hover {
        box-shadow: var(--shadow-elevated);
        transform: translateY(-4px);
      }
      .prize-img { 
        width: 96px;
        height: 96px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, var(--sheet) 0%, var(--sunken) 100%);
        border-radius: var(--radii-default);
      }
      .prize-title { 
        font-weight: var(--font-weight-bold);
        font-size: var(--font-2);
        text-align: center;
        color: var(--text);
      }
      .prize-sub { 
        font-size: var(--font-1);

      /* small screens: smaller cards */
      @media (max-width: 48em) {

    <script>
      (function(){
        // Sample ham-radio prizes (icons are inline SVG strings for portability)
        const prizes = [
          { name: 'Baofeng UV-5R', meta: 'Handheld HT', svg: '<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="64" height="64"><rect rx="6" width="44" height="56" x="10" y="4" fill="#0f172a" stroke="#94a3b8"/><rect x="18" y="12" width="20" height="6" rx="2" fill="#e2e8f0" opacity="0.9"/><rect x="18" y="22" width="28" height="18" rx="3" fill="#0b1220"/><circle cx="32" cy="32" r="6" fill="#38bdf8"/></svg>' },
          { name: 'SDR Dongle', meta: 'Software-defined radio', svg: '<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="64" height="64"><rect x="10" y="16" width="44" height="32" rx="4" fill="#041628" stroke="#60a5fa"/><rect x="18" y="22" width="28" height="4" rx="2" fill="#60a5fa"/><rect x="22" y="30" width="20" height="10" rx="2" fill="#94a3b8"/></svg>' },
          { name: 'Portable Antenna', meta: 'Custom-designed', svg: '<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="64" height="64"><circle cx="32" cy="24" r="6" fill="#f97316"/><rect x="30" y="30" width="4" height="18" rx="2" fill="#94a3b8"/><path d="M10 46c8-10 24-10 44 0" stroke="#60a5fa" stroke-width="2" fill="none"/></svg>' },
          { name: 'Antenna Fund', meta: '$200 funding', svg: '<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="64" height="64"><rect x="8" y="12" width="48" height="40" rx="6" fill="#05263a" stroke="#34d399"/><path d="M18 28h28v12H18z" fill="#34d399"/><text x="32" y="38" text-anchor="middle" font-size="10" fill="#042027" font-weight="700">$</text></svg>' },
          { name: '1:1 Mentoring', meta: 'Antenna design help', svg: '<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="64" height="64"><circle cx="24" cy="28" r="8" fill="#60a5fa"/><circle cx="40" cy="28" r="8" fill="#94a3b8"/><path d="M12 48c8-6 32-6 40 0" stroke="#e2e8f0" stroke-width="2" fill="none"/></svg>' },
          { name: 'Coax & Connectors', meta: 'Low-loss feedline', svg: '<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="64" height="64"><rect x="8" y="26" width="48" height="8" rx="4" fill="#0b1220" stroke="#94a3b8"/><rect x="6" y="22" width="8" height="16" rx="2" fill="#60a5fa"/></svg>' }
        ];

        // Helper to create a card element
        function makeCard(prize){
          const card = document.createElement('div');
          card.className = 'prize-card';
          card.innerHTML = `
            <div class="prize-img">${prize.svg}</div>
            <div class="prize-title">${prize.name}</div>
            <div class="prize-sub">${prize.meta}</div>
          `;
          return card;
        }

        // Populate track with duplicated prizes for seamless loop
        function populateAndAnimate(trackId, durationMs, reverse){
          const track = document.getElementById(trackId);
          if(!track) return;
          // append two sets
          const firstSet = document.createDocumentFragment();
          prizes.forEach(p => firstSet.appendChild(makeCard(p)));
          const secondSet = firstSet.cloneNode(true);
          track.appendChild(firstSet);
          track.appendChild(secondSet);

          // wait for layout
          requestAnimationFrame(()=>{
            const children = track.children;
            if(children.length <= prizes.length) return;
            const scrollDistance = children[prizes.length].offsetLeft;
            // web animations for smooth, linear infinite scroll
            track.animate(
              [ { transform: 'translateX(0)' }, { transform: `translateX(${reverse?scrollDistance+'px':'-'+scrollDistance+'px'})` } ],
              { duration: durationMs, iterations: Infinity, easing: 'linear' }
            );
          });
        }

        // init two tickers with different durations/directions
        document.addEventListener('DOMContentLoaded', ()=>{
          populateAndAnimate('prize-track-1', 28000, false); // left→right: false means move left (items scroll left)
          populateAndAnimate('prize-track-2', 42000, true);  // opposite pace/direction
          // pause animation on hover for accessibility
          ['prize-track-1','prize-track-2'].forEach(id=>{
            const root = document.getElementById(id);
            if(!root) return;
            root.parentElement.addEventListener('mouseenter', ()=>{
              root.getAnimations().forEach(a=>a.pause());
            });
            root.parentElement.addEventListener('mouseleave', ()=>{
              root.getAnimations().forEach(a=>a.play());
            });
          });
        });
      })();
    </script>
